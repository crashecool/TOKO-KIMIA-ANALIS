name: Expand catalog (tambah produk baru otomatis)

on:
  schedule:
    # Tiap 4 jam: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
    # = 07:00, 11:00, 15:00, 19:00, 23:00, 03:00 WIB
    # 6x sehari x 50 produk = 300 produk/hari
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Jumlah produk baru untuk batch ini'
        required: false
        default: '50'

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest
    timeout-minutes: 60 # 50 produk seharusnya selesai jauh di bawah ini
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Pilih batch produk baru berikutnya
        run: node expand-catalog.js --batch-size ${{ github.event.inputs.batch_size || '50' }}

      - name: Cek apakah ada produk baru untuk di-scrape
        id: check
        run: |
          if [ -s new-batch-urls.txt ]; then
            echo "has_batch=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_batch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Scrape produk baru (batch ini saja)
        if: steps.check.outputs.has_batch == 'true'
        run: node scrape.js --file new-batch-urls.txt
        env:
          DELAY_MS: 5000

      - name: Gabungkan produk baru ke docs/data.json
        if: steps.check.outputs.has_batch == 'true'
        run: node merge-to-site.js

      - name: Commit & push perubahan
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add urls.txt docs/data.json
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan, skip commit."
          else
            git commit -m "chore: expand katalog otomatis $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
